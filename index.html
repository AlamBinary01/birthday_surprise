    <!DOCTYPE html>
    <html lang="zh-TW">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Surprise</title>
        <link rel="icon" href="/public/favicon.ico" type="image/x-icon">
        <link href="style.css" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100..900&display=swap" rel="stylesheet">
        <style>
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background: linear-gradient(to right, #4a90e2, #9013fe);
                font-family: 'Noto Sans TC', sans-serif;
            }

            /* Hide content until countdown is over */
            #content {
                display: none;
            }

            /* Countdown timer styles */
            #countdown-overlay {
                background-color: rgba(0, 0, 0, 0.7);
                padding: 20px;
                border-radius: 10px;
                text-align: center;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            }

            #countdown-timer h2 {
                color: white;
                margin-bottom: 20px;
            }

            .clock-container {
                display: flex;
                justify-content: center;
            }

            .clock-col {
                margin: 0 15px;
                text-align: center;
                color: white;
            }

            .clock-day,
            .clock-hours,
            .clock-minutes,
            .clock-seconds {
                font-size: 3rem;
                font-weight: bold;
                margin: 0;
            }

            .clock-label {
                font-size: 1rem;
                color: #e0e0e0;
            }
        </style>
    </head>

    <body>
        <!-- Countdown Overlay -->
        <div id="countdown-overlay">
            <div id="countdown-timer">
                <h2>Surprise in</h2>
                <div class="clock-container">
                    <div class="clock-col">
                        <p class="clock-day clock-timer">10</p>
                        <p class="clock-label">DAY</p>
                    </div>
                    <div class="clock-col">
                        <p class="clock-hours clock-timer">0</p>
                        <p class="clock-label">HOURS</p>
                    </div>
                    <div class="clock-col">
                        <p class="clock-minutes clock-timer">0</p>
                        <p class="clock-label">MINUTES</p>
                    </div>
                    <div class="clock-col">
                        <p class="clock-seconds clock-timer">0</p>
                        <p class="clock-label">SECONDS</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Hidden Content -->
        <div id="content">
            <div id="volume-reminder" style="display: none;">
                <div id="volume-icon">🔊</div>
                <p>Please turn up the volume and then click me.</p>
            </div>

            <audio id="happy-birthday-audio">
                <source src="/happy-birthday.mp3" type="audio/mpeg">
                <br><br>
            </audio>

            <div id="hold-reminder">
                <p>Press and hold the screen to blow out the candles.</p>
            </div>

            <div id="congratulation-overlay">
                <div id="congratulation-text">Happy Birthday!</div>
            </div>
        </div>

        <script>
            const countdownOverlay = document.getElementById('countdown-overlay');
            const content = document.getElementById('content');
            const volumeReminder = document.getElementById('volume-reminder');
            const audio = document.getElementById('happy-birthday-audio');
        
            // Set target date and time (October 19, 2024, 12:00 PM)
            const targetDate = new Date('2024-10-19T12:00:00').getTime();
            let countdownInterval;
        
            // Update countdown every second
            function startCountdown() {
                countdownInterval = setInterval(function () {
                    const now = new Date().getTime();
                    const distance = targetDate - now;
        
                    // Calculate time components
                    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((distance % (1000 * 60)) / 1000);
        
                    // Update timer display
                    document.querySelector('.clock-day').textContent = days;
                    document.querySelector('.clock-hours').textContent = hours;
                    document.querySelector('.clock-minutes').textContent = minutes;
                    document.querySelector('.clock-seconds').textContent = seconds;
        
                    // When countdown reaches zero
                    if (distance < 0) {
                        clearInterval(countdownInterval);
                        countdownOverlay.style.display = 'none';
                        content.style.display = 'block'; // Show the hidden content
                        volumeReminder.style.display = 'block';
        
                        // Dynamically load external JS after countdown
                        const script = document.createElement('script');
                        script.type = 'module';
                        script.src = 'script.js';
                        document.body.appendChild(script);
                    }
                }, 1000);
            }
        
            // Start the countdown
            startCountdown();
        
            volumeReminder.addEventListener("click", function () {
                audio.play();
                volumeReminder.classList.remove('show');
                setTimeout(function () {
                    volumeReminder.style.display = 'none';
                }, 1000);
            });
        
            // Update time function for displaying clock
            document.addEventListener('DOMContentLoaded', () => {
                requestAnimationFrame(updateTime);
            });
        
            function updateTime() {
                // Assuming you're using moment.js to get the current time
                // Update as needed for your application
                document.documentElement.style.setProperty('--timer-day', "'" + moment().format("dd") + "'");
                document.documentElement.style.setProperty('--timer-hours', "'" + moment().format("k") + "'");
                document.documentElement.style.setProperty('--timer-minutes', "'" + moment().format("mm") + "'");
                document.documentElement.style.setProperty('--timer-seconds', "'" + moment().format("ss") + "'");
                requestAnimationFrame(updateTime);
            }
        </script>
        
    </body>

    </html>
